<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>TchouTchou5G</title>
  <link rel="icon" type="image/svg+xml" href="icons/icon.svg" />
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16.png" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#1a1a1a" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body>
  <div id="app">
    <header class="app-header">
      <div class="app-header__brand">
        <span class="app-header__mark">TT5G</span>
        <h1>TchouTchou5G</h1>
      </div>
      <div id="userBadge" class="app-header__user"></div>
    </header>

    <!-- Connexion / inscription -->
    <section id="screen-auth" class="screen">
      <div class="card card--form">
        <h2>Connexion</h2>
        <p class="hint">Un seul compte, une seule fois — la session reste active sur cet appareil.</p>
        <label for="authEmail">Email</label>
        <input id="authEmail" class="input" type="email" autocomplete="email" />
        <label for="authPassword">Mot de passe</label>
        <input id="authPassword" class="input" type="password" autocomplete="current-password" />
        <div class="btn-row">
          <button id="btnSignIn" class="btn btn-primary">Se connecter</button>
          <button id="btnSignUp" class="btn btn-ghost">Créer un compte</button>
        </div>
        <div id="authError" class="error-text"></div>
      </div>
    </section>

    <!-- Accueil : liste des trajets -->
    <section id="screen-home" class="screen">
      <div class="card">
        <label for="tripNameInput">Nom du trajet (optionnel)</label>
        <input id="tripNameInput" class="input" type="text" placeholder="Paris – Lyon" />
        <button id="btnStartTrip" class="btn btn-primary btn-block">
          <svg viewBox="0 0 24 24" class="icon" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
          Démarrer un enregistrement
        </button>
      </div>
      <div class="card card--flush">
        <h2 class="card__title">Trajets précédents</h2>
        <div id="tripList"></div>
      </div>
    </section>

    <!-- Enregistrement en cours -->
    <section id="screen-record" class="screen screen-map">
      <div id="map"></div>
      <div class="legend">
        <span class="legend__item"><span class="dot dot--green"></span>Bon</span>
        <span class="legend__item"><span class="dot dot--yellow"></span>Lent</span>
        <span class="legend__item"><span class="dot dot--orange"></span>Instable</span>
        <span class="legend__item"><span class="dot dot--red"></span>Coupé</span>
      </div>
      <div id="gpsStatus" class="status-bar status-bar--gps">Position GPS : initialisation…</div>
      <div id="recordStatus" class="status-bar">Initialisation…</div>
      <div id="pingList" class="ping-list"></div>
      <div class="action-bar action-bar--split">
        <button id="btnPauseTrip" class="btn btn-secondary">
          <svg viewBox="0 0 24 24" class="icon" fill="currentColor"><rect x="6" y="5" width="4" height="14" rx="1"/><rect x="14" y="5" width="4" height="14" rx="1"/></svg>
          Mettre en pause
        </button>
        <button id="btnStopTrip" class="btn btn-danger">
          <svg viewBox="0 0 24 24" class="icon" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
          Arrêter
        </button>
      </div>
    </section>

    <!-- Revue d'un trajet passé -->
    <section id="screen-review" class="screen screen-map">
      <div id="mapReview" style="flex:1;"></div>
      <div class="legend">
        <span class="legend__item"><span class="dot dot--green"></span>Bon</span>
        <span class="legend__item"><span class="dot dot--yellow"></span>Lent</span>
        <span class="legend__item"><span class="dot dot--orange"></span>Instable</span>
        <span class="legend__item"><span class="dot dot--red"></span>Coupé</span>
      </div>
      <div id="reviewSummary" class="status-bar"></div>
      <div id="pingListReview" class="ping-list"></div>
      <div class="action-bar action-bar--split">
        <button id="btnBackFromReview" class="btn btn-secondary">
          <svg viewBox="0 0 24 24" class="icon" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
          Retour
        </button>
        <button id="btnDeleteFromReview" class="btn btn-danger-ghost">
          <svg viewBox="0 0 24 24" class="icon" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2m3 0-1 14a2 2 0 01-2 2H7a2 2 0 01-2-2L4 6h16z"/></svg>
          Supprimer ce trajet
        </button>
      </div>
    </section>

    <!-- Réglages -->
    <section id="screen-settings" class="screen">
      <div class="card">
        <h2 class="card__title">Réglages du ping</h2>
        <label for="setInterval">Intervalle entre pings (secondes)</label>
        <input id="setInterval" class="input" type="number" min="5" step="1" />
        <label for="setTimeout">Timeout par ping (secondes)</label>
        <input id="setTimeout" class="input" type="number" min="1" step="1" />
        <label for="setWindow">Taille de la fenêtre glissante (nb de pings)</label>
        <input id="setWindow" class="input" type="number" min="1" step="1" />
      </div>
      <div class="card">
        <h2 class="card__title">Seuils de couleur</h2>
        <label for="setRed">Taux de succès max pour Rouge (%)</label>
        <input id="setRed" class="input" type="number" min="0" max="100" step="5" />
        <label for="setOrange">Taux de succès max pour Orange (%)</label>
        <input id="setOrange" class="input" type="number" min="0" max="100" step="5" />
        <label for="setYellow">Latence min pour Jaune (ms)</label>
        <input id="setYellow" class="input" type="number" min="0" step="50" />
      </div>
      <button id="btnSaveSettings" class="btn btn-primary btn-block">Enregistrer</button>
      <button id="btnSignOut" class="btn btn-ghost btn-block">Se déconnecter</button>
    </section>

    <nav class="tabs" id="mainTabs">
      <button id="tabHome" data-target="screen-home">Accueil</button>
      <button id="tabSettings" data-target="screen-settings">Réglages</button>
    </nav>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
